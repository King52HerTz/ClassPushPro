name: Morning Push (07:00)

on:
  schedule:
    # 每天北京时间 07:00 运行 (UTC 时间 23:00)
    # 早上推送今天的课表
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动触发测试

permissions:
  contents: read

concurrency:
  group: classpush-cloud-state-${{ github.repository }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # 设置时区为北京时间，方便日志查看
    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Prepare ClassPush cache dir
      run: |
        mkdir -p ~/.ClassPush

    - name: Restore ClassPush cache
      uses: actions/cache@v4
      with:
        path: ~/.ClassPush
        # Actions 缓存不可覆盖：每次用唯一 key 保存，再从统一前缀恢复最近一次状态。
        key: classpush-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          classpush-state-${{ runner.os }}-${{ github.ref_name }}-
          classpush-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装核心依赖 (剔除 GUI 相关库如 pywebview)
        pip install requests pycryptodome beautifulsoup4 lxml

    - name: Run Push Task
      env:
        # 将 Secrets 注入到环境变量，供 config_manager.py 读取
        CP_USERNAME: ${{ secrets.CP_USERNAME }}
        CP_PASSWORD: ${{ secrets.CP_PASSWORD }}
        CP_APP_TOKEN: ${{ secrets.CP_APP_TOKEN }}
        CP_UID: ${{ secrets.CP_UID }}
        # 可选：填入本地 ~/.ClassPush/config.json 的 Base64 内容，作为云端初始缓存
        CP_CONFIG_JSON_B64: ${{ secrets.CP_CONFIG_JSON_B64 }}
        # 强制指定推送时间为 07:00，确保脚本识别为“早安推送”，只推今天的课
        CP_PUSH_TIME: "07:00"
        # 手动触发和定时触发都关闭抖动延迟，避免卡住数分钟
        CP_JITTER_MAX_SECONDS: "0"
        # 教务站点失败时尽快回退到缓存，避免 Actions 长时间卡住
        CP_HTTP_CONNECT_TIMEOUT: "10"
        CP_HTTP_READ_TIMEOUT: "15"
        CP_HTTP_RETRIES: "1"
      run: |
        # 运行无头模式脚本
        # 适配不同的目录结构 (RestoredSource 或 src)
        if [ -f "src/action_runner.py" ]; then
          python src/action_runner.py
        elif [ -f "RestoredSource/src/action_runner.py" ]; then
          python RestoredSource/src/action_runner.py
        else
          echo "Error: Could not find action_runner.py"
          exit 1
        fi
