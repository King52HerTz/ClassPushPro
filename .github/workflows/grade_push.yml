name: Grade Check (Every 30 Minutes)

on:
  schedule:
    # 北京时间 07:11～23:41，每小时 11 分和 41 分检查一次。
    # GitHub 定时任务可能延迟或漏掉单次触发，半小时双时间窗可提高及时性。
    - cron: '11,41 0-15,23 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: classpush-cloud-state-${{ github.repository }}
  cancel-in-progress: false

jobs:
  grades:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Prepare ClassPush cache dir
      run: mkdir -p ~/.ClassPush

    - name: Restore ClassPush state
      uses: actions/cache@v4
      with:
        path: ~/.ClassPush
        key: classpush-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          classpush-state-${{ runner.os }}-${{ github.ref_name }}-
          classpush-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r RestoredSource/requirements-actions.txt

    - name: Check grade changes
      env:
        CP_USERNAME: ${{ secrets.CP_USERNAME }}
        CP_PASSWORD: ${{ secrets.CP_PASSWORD }}
        CP_APP_TOKEN: ${{ secrets.CP_APP_TOKEN }}
        CP_UID: ${{ secrets.CP_UID }}
        CP_CONFIG_JSON_B64: ${{ secrets.CP_CONFIG_JSON_B64 }}
        CP_JOB: grades
        CP_GRADE_PUSH_ENABLED: "true"
        CP_JITTER_MAX_SECONDS: "0"
        CP_HTTP_CONNECT_TIMEOUT: "10"
        CP_HTTP_READ_TIMEOUT: "15"
        CP_HTTP_RETRIES: "1"
      run: python RestoredSource/src/action_runner.py
