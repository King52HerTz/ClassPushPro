name: Night Push (20:00 + retries)

on:
  schedule:
    # 北京时间 20:00、20:20、20:40 检查明天课表。
    # 首次成功后，后续场次会命中日期去重键并直接跳过，不会重复调用 WxPusher。
    - cron: '0,20,40 12 * * *'
  workflow_dispatch: # 允许手动触发测试

permissions:
  contents: read

concurrency:
  group: classpush-cloud-state-${{ github.repository }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # 设置时区为北京时间，方便日志查看
    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Prepare ClassPush cache dir
      run: |
        mkdir -p ~/.ClassPush

    - name: Restore ClassPush cache
      uses: actions/cache@v4
      with:
        path: ~/.ClassPush
        key: classpush-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          classpush-state-${{ runner.os }}-${{ github.ref_name }}-
          classpush-${{ runner.os }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r RestoredSource/requirements-actions.txt

    - name: Run Push Task
      env:
        # 将 Secrets 注入到环境变量，供 config_manager.py 读取
        CP_USERNAME: ${{ secrets.CP_USERNAME }}
        CP_PASSWORD: ${{ secrets.CP_PASSWORD }}
        CP_APP_TOKEN: ${{ secrets.CP_APP_TOKEN }}
        CP_UID: ${{ secrets.CP_UID }}
        # 可选：将本地配置转为 Base64 后存入 Secret，禁止把 config.json 提交到仓库
        CP_CONFIG_JSON_B64: ${{ secrets.CP_CONFIG_JSON_B64 }}
        CP_PUSH_TIME: "20:00"
        CP_PUSH_SLOT: "night"
        # 手动触发和定时触发都关闭抖动延迟，避免卡住数分钟
        CP_JITTER_MAX_SECONDS: "0"
        # 教务站点失败时尽快回退到缓存，避免 Actions 长时间卡住
        CP_HTTP_CONNECT_TIMEOUT: "10"
        CP_HTTP_READ_TIMEOUT: "15"
        CP_HTTP_RETRIES: "1"
      run: |
        # 运行无头模式脚本
        # 注意：这里路径是 src/action_runner.py，因为 action_runner 在 src 下
        # 而 RestoredSource 是之前的备份目录结构，我们假设用户 fork 的是整理后的根目录
        # 如果当前仓库结构是 RestoredSource/src，则需调整路径
        if [ -f "src/action_runner.py" ]; then
          python src/action_runner.py
        elif [ -f "RestoredSource/src/action_runner.py" ]; then
          python RestoredSource/src/action_runner.py
        else
          echo "Error: Could not find action_runner.py"
          exit 1
        fi
